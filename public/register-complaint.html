<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Complaint - Complaint System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>Complaint Management System</h1>
        <nav id="nav"></nav>
    </header>

    <div id="alertContainer"></div>

    <main class="container">
        <h2>Register Complaint</h2>

        <form id="complaintForm">
            <label>Complaint Title:</label><br>
            <input type="text" name="title" required><br><br>

            <label>Complaint Category:</label><br>
            <select name="category" required>
                <option value="">--Select Category--</option>
                <option>Technical Issue</option>
                <option>Service Issue</option>
                <option>Billing Issue</option>
                <option>Other</option>
            </select><br><br>

            <label>Complaint Description:</label><br>
            <textarea name="description" rows="5" cols="40" required></textarea><br><br>

            <label>Upload Supporting File:</label><br>
            <input type="file" name="file"><br><br>

            <button type="submit">Submit Complaint</button>
        </form>

        <br>
        <a href="/">Back to Home</a>
    </main>

    <footer>Developed by Sarthak Kendre</footer>
    <script src="/js/common.js"></script>
    <script src="/js/register-complaint.js"></script>
</body>
</html>
